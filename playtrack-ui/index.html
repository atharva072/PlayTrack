<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PlayTrack - Login</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!--
    SVG FIELD — drawn on a 1050 × 680 coordinate space (standard FIFA proportions).
    Pitch inset: 60px margin on all sides inside the SVG.
    All markings follow real football dimensions scaled to this canvas.
  -->
  <div class="field">
    <svg viewBox="0 0 1050 680" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Alternating grass stripes -->
        <pattern id="grass" x="0" y="0" width="80" height="680" patternUnits="userSpaceOnUse">
          <rect x="0"  y="0" width="40" height="680" fill="#1a5c1a"/>
          <rect x="40" y="0" width="40" height="680" fill="#1e6b1e"/>
        </pattern>
        <!-- Subtle noise texture for realism -->
        <filter id="grassNoise">
          <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
          <feColorMatrix type="saturate" values="0"/>
          <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
          <feComposite in="blend" in2="SourceGraphic" operator="in"/>
        </filter>
        <radialGradient id="fieldVignette" cx="50%" cy="50%" r="70%">
          <stop offset="0%"   stop-color="transparent"/>
          <stop offset="100%" stop-color="rgba(0,0,0,0.45)"/>
        </radialGradient>
      </defs>

      <!-- Grass base -->
      <rect x="0" y="0" width="1050" height="680" fill="url(#grass)"/>

      <!-- Subtle noise overlay for texture -->
      <rect x="0" y="0" width="1050" height="680" fill="rgba(0,0,0,0.08)" filter="url(#grassNoise)" opacity="0.4"/>

      <!-- Vignette for depth -->
      <rect x="0" y="0" width="1050" height="680" fill="url(#fieldVignette)"/>

      <!-- ── MARKINGS (all white, stroke-width=3) ── -->
      <g fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">

        <!-- Outer pitch boundary: inset 60px each side → 60,60 to 990,620 -->
        <rect x="60" y="60" width="930" height="560"/>

        <!-- Centre line (vertical) -->
        <line x1="525" y1="60" x2="525" y2="620"/>

        <!-- Centre circle: radius 91.5 scaled ≈ 88px -->
        <circle cx="525" cy="340" r="88"/>

        <!-- Centre spot -->
        <circle cx="525" cy="340" r="4" fill="white" stroke="none"/>

        <!-- ── LEFT PENALTY BOX ──
             FIFA: 40.32m wide × 16.5m deep on a 105×68m pitch
             Scaled: 40.32/68 × 560 ≈ 332px tall; 16.5/105 × 930 ≈ 146px deep
             Centred vertically: top = 340 - 166 = 174, bottom = 340 + 166 = 506 -->
        <rect x="60" y="174" width="146" height="332"/>

        <!-- ── LEFT GOAL BOX ──
             FIFA: 18.32m wide × 5.5m deep
             Scaled: 18.32/68 × 560 ≈ 151px tall; 5.5/105 × 930 ≈ 49px deep
             top = 340 - 75 = 265, bottom = 340 + 75 = 415 -->
        <rect x="60" y="265" width="49" height="150"/>

        <!-- LEFT PENALTY SPOT: 11m from goal line → 11/105 × 930 ≈ 97px from left edge (60+97=157) -->
        <circle cx="157" cy="340" r="4" fill="white" stroke="none"/>

        <!-- LEFT PENALTY ARC: radius 91.5 scaled ≈ 88px, centred on spot, clipped to outside box -->
        <path d="M 206 268 A 88 88 0 0 1 206 412" stroke="white" fill="none"/>

        <!-- LEFT GOAL (net frame): depth 2.44m → 2.44/105 × 930 ≈ 22px; width 7.32m → 7.32/68 × 560 ≈ 60px -->
        <rect x="38" y="310" width="22" height="60" stroke="white" stroke-width="2.5" fill="rgba(255,255,255,0.06)"/>

        <!-- Corner arcs LEFT (radius 9.15m → 9.15/105 × 930 ≈ 8px — too small, use 14px for visibility) -->
        <path d="M 60 74 A 14 14 0 0 1 74 60"/>
        <path d="M 60 606 A 14 14 0 0 0 74 620"/>

        <!-- ── RIGHT PENALTY BOX (mirror) ── -->
        <rect x="844" y="174" width="146" height="332"/>

        <!-- RIGHT GOAL BOX -->
        <rect x="941" y="265" width="49" height="150"/>

        <!-- RIGHT PENALTY SPOT: 11m from right goal line → 990 - 97 = 893 -->
        <circle cx="893" cy="340" r="4" fill="white" stroke="none"/>

        <!-- RIGHT PENALTY ARC -->
        <path d="M 844 268 A 88 88 0 0 0 844 412" stroke="white" fill="none"/>

        <!-- RIGHT GOAL -->
        <rect x="990" y="310" width="22" height="60" stroke="white" stroke-width="2.5" fill="rgba(255,255,255,0.06)"/>

        <!-- Corner arcs RIGHT -->
        <path d="M 990 74 A 14 14 0 0 0 976 60"/>
        <path d="M 990 606 A 14 14 0 0 1 976 620"/>

      </g>
    </svg>
  </div>

  <h1 class="title">PlayTrack</h1>

  <div class="auth-wrapper">
    <div class="container" id="container1">
      <div class="login-card">
        <form id="loginForm">
          <input type="text" id="username" placeholder="Username" required />
          <input type="password" id="password" placeholder="Password" required />
          <button type="button" id="loginBtn">Login</button>
          <div class="auth-feedback" id="authFeedback">
            <div class="error-container">
              <p id="error" class="error-text"></p>
            </div>
            <div class="register-link" id="registerLink">
              <span>Not a registered user?</span>
              <a href="#" id="registerKeyWord">Register now</a>
            </div>
          </div>
        </form>
      </div>
    </div>

    <div class="container offscreen-right" id="container2">
      <div class="register-card">
        <form id="registerForm">
          <input type="text" id="registerUsername" placeholder="Username" required />
          <div class="username-feedback" id="usernameFeedback" style="display: hidden">

          </div>
          <input type="password" id="registerPassword1" placeholder="Password" required />
          <input type="password" id="registerPassword2" placeholder="Confirm Password" required />
          <div id="validation"></div>
          <div class="register-actions">
            <button type="button" id="backToLogin" class="register-back">Back</button>
            <button type="button" id="registerBtn" class="register-main">Register</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <i><p class="tag-line" id="tagline"></p></i>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
