<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlayTrack - Login</title>
    <link rel="stylesheet" href="css/styles.css">
  </head>

  <body>
    <div class="field"></div>
      <h1 class="title">PlayTrack</h1>
      <p class="tagline">Ready to Play?</p>

      <div class="auth-wrapper">
        <div class="container" id="container1">

          <div class="login-card">
            <form id="loginForm">
              <input type="text" id="username" placeholder="Username" required />
              <input type="password" id="password" placeholder="Password" required />
              <button type="button" id="loginBtn">Login</button>

              <div class="auth-feedback" id="authFeedback">
                <div class="error-container">
                  <p id="error" class="error-text"></p>
                </div>
                <div class="register-link" id="registerLink">
                  <span>Not a registered user?</span>
                  <a href="#" id="registerKeyWord">Register now</a>
                  <!--<a href="register.html" >Register now</a>-->
                </div>
              </div>
            </form>
          </div>
        </div>

        <div class="container offscreen-right" id="container2">
          <div class="register-card">
            <form id="registerForm">
              <input type="text" id="registerUsername" placeholder="Username" required />
              <input type="password" id="registerPassword1" placeholder="Password" required />
              <input type="password" id="registerPassword2" placeholder="Confirm Password" required />
              <div class="register-actions">
                <button type="button" id="backToLogin" class="register-back">
                  Back
                </button>

                <button type="button" id="registerBtn" class="register-main">
                  Register
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <script type="module" src="./js/auth.js"></script>
  </body>
</html>
